<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Spesial</title>
    <link href="https://fonts.googleapis.com/css2?family=Ibarra+Nova:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Ibarra Nova', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #ffffff 0%, #f3efea 100%); /* Efek gradien agar tidak flat */
            color: #2c2c2c;
        }

        .card {
            text-align: center;
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 2px; /* Gaya minimalis kotak elegan */
            box-shadow: 0 20px 50px rgba(0,0,0,0.08); /* Shadow yang dalam agar terlihat 3D/timbul */
            max-width: 450px;
            width: 85%;
            border: 1px solid #e0d8cc;
            position: relative;
        }

        /* Garis dekoratif atas */
        .card::before {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid #e0d8cc;
            pointer-events: none;
        }

        p {
            font-size: 1.1em;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
            color: #8a7b66;
        }

        .guest-name {
            font-family: 'Ibarra Nova', serif;
            font-size: 2.2em;
            font-weight: 700;
            font-style: italic;
            color: #4a3f35;
            margin: 20px 0 40px 0;
            display: block;
            line-height: 1.2;
        }

        .btn-open {
            font-family: 'Montserrat', sans-serif;
            display: inline-block;
            text-decoration: none;
            background-color: #4a3f35;
            color: #ffffff;
            padding: 15px 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8em;
            font-weight: 600;
            transition: all 0.4s ease;
            border: 1px solid #4a3f35;
        }

        .btn-open:hover {
            background-color: transparent;
            color: #4a3f35;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="card">
        <p>Kepada Yang Terhormat,</p>
        <span id="nama-tamu" class="guest-name">Tamu Undangan</span>
        <p style="text-transform: none; font-style: italic; font-size: 1em; margin-bottom: 30px;">
            Kami mengundang Anda untuk hadir di acara kami.
        </p>
        
        <a href="https://naufal-check.my.canva.site" class="btn-open">Buka Undangan</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let nama = urlParams.get('to');

        if (nama) {
            // Membersihkan karakter aneh dan menampilkan nama
            document.getElementById('nama-tamu').innerText = decodeURIComponent(nama);
        }
    </script>
</body>
</html>
