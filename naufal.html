<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Spesial</title>
    <link href="https://fonts.googleapis.com/css2?family=Ibarra+Nova:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Ibarra Nova', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Gradient Rose Gold yang lembut */
            background: radial-gradient(circle, #fff5f5 0%, #eecda3 100%); 
            background: linear-gradient(135deg, #fce4ec 0%, #f1d5d2 50%, #d4a3a3 100%);
            color: #2c2c2c;
        }

        .card {
            text-align: center;
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(183, 110, 110, 0.15); /* Shadow kemerahan tipis */
            max-width: 450px;
            width: 85%;
            /* Border warna Rose Gold Metalik */
            border: 1px solid #d4a3a3; 
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid #eecda3; /* Garis dekoratif lebih terang */
            pointer-events: none;
        }

        p {
            font-size: 1.1em;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
            /* Warna teks Rose Brown */
            color: #a67c7c; 
        }

        .guest-name {
            font-family: 'Ibarra Nova', serif;
            font-size: 2.2em;
            font-weight: 700;
            font-style: italic;
            /* Warna fokus Rose Gold Gelap */
            color: #8c5e5e; 
            margin: 20px 0 40px 0;
            display: block;
            line-height: 1.2;
        }

        .btn-open {
            font-family: 'Montserrat', sans-serif;
            display: inline-block;
            text-decoration: none;
            /* Tombol warna Rose Gold Solid */
            background-color: #b76e79; 
            color: #ffffff;
            padding: 15px 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8em;
            font-weight: 600;
            transition: all 0.4s ease;
            border: 1px solid #b76e79;
        }

        .btn-open:hover {
            background-color: transparent;
            color: #b76e79;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(183, 110, 121, 0.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <p>Kepada Yang Terhormat,</p>
        <span id="nama-tamu" class="guest-name">Tamu Undangan</span>
        <p style="text-transform: none; font-style: italic; font-size: 1em; margin-bottom: 30px;">
            Kami mengundang Anda untuk hadir di acara kami.
        </p>
        
        <a href="https://naufal-check.my.canva.site" class="btn-open">Buka Undangan</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let nama = urlParams.get('to');

        if (nama) {
            document.getElementById('nama-tamu').innerText = decodeURIComponent(nama);
        }
    </script>
</body>
</html>
