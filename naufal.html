<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Spesial</title>

    <link href="https://fonts.googleapis.com/css2?family=Ibarra+Nova:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Ibarra Nova', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;

            /* Sage Green - lebih deep & elegan */
            background: linear-gradient(135deg, #e2ebe2 0%, #c2d2c2 50%, #8fa98f 100%);
            color: #2c2c2c;
        }

        .card {
            text-align: center;
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 6px;

            box-shadow: 0 20px 50px rgba(70, 90, 70, 0.18);

            max-width: 450px;
            width: 85%;

            border: 1px solid #8aa58a;
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid #c7d9c7;
            pointer-events: none;
        }

        p {
            font-size: 1.05em;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            text-transform: uppercase;
            color: #6f866f;
        }

        .guest-name {
            font-size: 2.3em;
            font-weight: 700;
            font-style: italic;
            color: #3f5f3f;
            margin: 20px 0 40px 0;
            display: block;
            line-height: 1.2;
        }

        .desc {
            text-transform: none;
            font-style: italic;
            font-size: 1em;
            margin-bottom: 30px;
            color: #5f6f5f;
        }

        .btn-open {
            font-family: 'Montserrat', sans-serif;
            display: inline-block;
            text-decoration: none;

            background: linear-gradient(135deg, #7f9f7f, #5f7f5f);
            color: #ffffff;

            padding: 15px 45px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8em;
            font-weight: 600;

            border: none;
            transition: all 0.3s ease;
        }

        .btn-open:hover {
            background: transparent;
            color: #5f7f5f;
            border: 1px solid #5f7f5f;

            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(80, 100, 80, 0.25);
        }
    </style>
</head>

<body>

<div class="card">
    <p>Kepada Yang Terhormat</p>

    <span id="nama-tamu" class="guest-name">
        Tamu Undangan
    </span>

    <p class="desc">
        Kami mengundang Anda untuk hadir di acara kami.
    </p>

    <a href="https://naufal-check.my.canva.site" class="btn-open">
        Buka Undangan
    </a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let nama = urlParams.get('to');

    if (nama) {
        document.getElementById('nama-tamu').innerText = decodeURIComponent(nama);
    }
</script>

</body>
</html>
