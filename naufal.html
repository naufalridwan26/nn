<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Spesial</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Ibarra+Nova:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            font-family: 'Ibarra Nova', serif;

            /* Gradient dari palette Canva */
            background: linear-gradient(135deg, #EEF2EC 0%, #DDE5D8 50%, #B2BBA9 100%);
            color: #2c2c2c;
        }

        .card {
            background: #ffffff;
            padding: 55px 45px;
            width: 85%;
            max-width: 420px;
            text-align: center;

            border-radius: 8px;
            border: 1px solid #B2BBA9;

            box-shadow: 0 25px 60px rgba(100, 110, 95, 0.18);
            position: relative;
        }

        /* inner border biar classy */
        .card::before {
            content: "";
            position: absolute;
            top: 14px; left: 14px; right: 14px; bottom: 14px;
            border: 1px solid #DDE5D8;
            pointer-events: none;
        }

        .title {
            font-size: 1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #8F9A85;
            margin-bottom: 10px;
        }

        .guest-name {
            font-size: 2.4em;
            font-weight: 700;
            font-style: italic;
            color: #6E7866;
            margin: 25px 0 35px 0;
            line-height: 1.2;
        }

        .desc {
            font-size: 1em;
            font-style: italic;
            color: #7f8a76;
            margin-bottom: 35px;
        }

        .btn-open {
            font-family: 'Montserrat', sans-serif;
            text-decoration: none;

            background-color: #B2BBA9;
            color: #ffffff;

            padding: 15px 50px;
            font-size: 0.8em;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;

            border-radius: 2px;
            border: 1px solid #B2BBA9;

            transition: all 0.3s ease;
        }

        .btn-open:hover {
            background: transparent;
            color: #6E7866;
            border: 1px solid #6E7866;

            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(100, 110, 95, 0.25);
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="title">Kepada Yang Terhormat</div>

        <div id="nama-tamu" class="guest-name">
            Tamu Undangan
        </div>

        <div class="desc">
            Kami mengundang Anda untuk hadir di acara kami.
        </div>

        <a href="https://naufal-check.my.canva.site" class="btn-open">
            Buka Undangan
        </a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let nama = urlParams.get('to');

        if (nama) {
            document.getElementById('nama-tamu').innerText = decodeURIComponent(nama);
        }
    </script>

</body>
</html>
